# fly.toml — Personals app
# Deploy with:  fly deploy --remote-only
app = 'royce-personals'
primary_region = 'sjc'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3000'
  DATA_DIR = '/data'
  DB_PATH = '/data/personals.db'
  UPLOAD_DIR = '/data/uploads'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

# Persistent storage for the SQLite database + uploaded images
[[mounts]]
  source = 'personals_data'
  destination = '/data'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
